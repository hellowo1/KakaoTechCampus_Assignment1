<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Productivity Todo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-container">
        <header>
            <h1>생산성 Todo 앱</h1>
        </header>

        <div class="date-navigation">
            <button id="prev-date-button" class="nav-button">◀</button>
            <span id="date-display"></span>
            <button id="next-date-button" class="nav-button">▶</button>
            <button id="today-button" class="today-button">오늘</button>
        </div>

        <div class="week-view-section">
            <div class="week-navigation">
                <button id="prev-week-button" class="week-nav-button">← 이전 주</button>
                <span id="week-display"></span>
                <button id="next-week-button" class="week-nav-button">다음 주 →</button>
            </div>
            <div id="week-days-container" class="week-days-container"></div>
        </div>
        
        <div class="input-section">
            <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." autocomplete="off">
            <button id="add-button">추가</button>
        </div>

        <div class="filter-section">
            <button class="filter-button active" data-filter="all">전체</button>
            <button class="filter-button" data-filter="active">진행 중</button>
            <button class="filter-button" data-filter="completed">완료</button>
        </div>

        <ul id="todo-list"></ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
